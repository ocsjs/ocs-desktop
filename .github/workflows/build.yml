name: Build and Upload

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            platform: win
            arch: x64

          # macOS x64 (Intel Mac runner 原生构建)
          - os: macos-15-intel
            platform: mac
            arch: x64

          # macOS ARM64
          - os: macos-latest
            platform: mac
            arch: arm64

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Set Env
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "PLATFORM=${{ matrix.platform }}" >> $GITHUB_ENV
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
        shell: bash

      - name: Build
        run: pnpm build
        env:
          USE_HARD_LINKS: false
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            packages/app/dist/*.exe
            packages/app/dist/*.dmg
            packages/app/dist/*.AppImage
            packages/app/dist/*.deb
            packages/app/dist/*.rpm
          if-no-files-found: ignore
          retention-days: 3

  upload-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Set Env
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/"
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          BUILDTIME=$(TZ=Asia/Shanghai date)
          echo "BUILDTIME=$BUILDTIME" >> $GITHUB_ENV
        shell: bash

      - name: Create Release if not exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          gh release create "$TAG_NAME" --draft --generate-notes || true

      - name: Upload artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Uploading artifacts to release: $TAG_NAME"
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "$TAG_NAME" "$file" --clobber || echo "Failed to upload $file"
            fi
          done

      - name: Append custom release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          EXISTING_BODY=$(gh release view "$TAG_NAME" --json body -q .body 2>/dev/null || echo "")
          DL="${{ env.DOWNLOAD_URL }}"
          VER="${{ env.VERSION }}"
          BT="${{ env.BUILDTIME }}"
          CUSTOM_NOTES="
          ---
          ## 📦 下载地址
          ### Windows (不支持Win7)
          - [64位安装包](${DL}ocs-${VER}-setup-win-x64.exe)
          ### macOS
          - [M系列芯片(ARM64)](${DL}ocs-${VER}-setup-mac-arm64.dmg) | [Intel芯片(x64)](${DL}ocs-${VER}-setup-mac-x64.dmg)
          ### Linux
          - [AppImage](${DL}ocs-${VER}-setup-linux-x64.AppImage)
          ### 🔗 快捷访问
          - [官网](https://docs.ocsjs.com/)
          - [官网软件下载（更快）](https://docs.ocsjs.com/docs/app)
          > Created at ${BT}."
          gh release edit "$TAG_NAME" --notes "${EXISTING_BODY}${CUSTOM_NOTES}"

  upload-cos:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # 腾讯云 COS 上传 — 需要配置 secrets
    # 如果是 fork 仓库没有密钥，此 job 会自动跳过
    continue-on-error: true

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Set Env
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check COS secrets availability
        id: check-secrets
        run: |
          if [ -n "$COS_SECRET_ID" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Skipping COS upload: TENCENT_SECRET_ID not configured"
          fi
        env:
          COS_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}

      - name: Install Tencent Cloud CLI
        if: steps.check-secrets.outputs.available == 'true'
        run: pip install coscmd

      - name: Configure Tencent Cloud COS
        if: steps.check-secrets.outputs.available == 'true'
        run: |
          coscmd config -a ${{ secrets.TENCENT_SECRET_ID }} -s ${{ secrets.TENCENT_SECRET_KEY }} -b ${{ secrets.COS_BUCKET }} -r ${{ secrets.COS_REGION }}

      - name: Upload to Tencent Cloud COS
        if: steps.check-secrets.outputs.available == 'true'
        run: |
          coscmd upload -r artifacts/ /app/download/${{ env.VERSION }}/  --include *.exe,*.dmg,*.AppImage,*.deb,*.rpm  --ignore  "**/*/chrome.zip"