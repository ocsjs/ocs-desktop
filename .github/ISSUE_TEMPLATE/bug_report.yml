name: 🐞 Bug 报告
description: 报告软件错误，帮助我们改进
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 Bug 报告！请填写以下信息以帮助我们快速定位问题。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 前置检查
      description: 在提交前请确认以下事项
      options:
        - label: 我已搜索过现有 issues，没有找到类似问题
          required: true
        - label: 我已尝试过最新版本
          required: true

  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      description: 请选择你使用的操作系统
      options:
        - Windows (10/11)
        - Windows 7/8
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (Ubuntu/Debian)
        - Linux (其他发行版)
      default: 0
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 可在设置 - 关于中查看
      placeholder: "e.g., v2.10.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清晰简洁地描述这个 bug
      placeholder: "发生了什么？你看到了什么异常行为？"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现此问题
      placeholder: |
        1. 打开应用
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
      placeholder: "正常情况下应该..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      description: 如有错误日志或截图请在此粘贴
      render: shell
